<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dream Farm Trust - Exotic Fruit Delivery</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React and ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- GSAP -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/MotionPathPlugin.min.js"></script>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    gsap.registerPlugin(ScrollTrigger, MotionPathPlugin);

    function DreamFarmApp() {
      const scopeRef = useRef(null);
      const stageRef = useRef(null);
      const cameraRef = useRef(null);
      const heroRef = useRef(null);
      const islandAnchorRef = useRef(null);
      const farmAnchorRef = useRef(null);
      const box1Ref = useRef(null);
      const box2Ref = useRef(null);
      const box3Ref = useRef(null);

      const [ready, setReady] = useState(false);
      const [shipToZip, setShipToZip] = useState("");
      const [boxCount, setBoxCount] = useState(1);
      const [weightPerBoxLbs, setWeightPerBoxLbs] = useState(8);
      const [service, setService] = useState("GROUND");
      const [shipEst, setShipEst] = useState(null);
      const [cardName, setCardName] = useState("");
      const [cardNumber, setCardNumber] = useState("");
      const [exp, setExp] = useState("");
      const [cvc, setCvc] = useState("");
      const [processing, setProcessing] = useState(false);
      const [paid, setPaid] = useState(false);
      const [orderId, setOrderId] = useState("");

      const BG = useMemo(() => ({
        island: "https://images.unsplash.com/photo-1685914547257-7b26e3f2d3ae?auto=format&fit=crop&w=2400&q=80",
        ocean: "https://images.unsplash.com/photo-1569263900347-06b1f8d45f84?auto=format&fit=crop&w=2400&q=80",
        forest: "https://images.unsplash.com/photo-1712568392573-6c2e63f2a4ab?auto=format&fit=crop&w=2400&q=80",
        farm: "https://images.unsplash.com/photo-1672823757008-09e74d9e0a4a?auto=format&fit=crop&w=2400&q=80",
        tiki: "https://images.unsplash.com/photo-1723817585608-36ba0ceea1f0?auto=format&fit=crop&w=1400&q=80",
        table: "https://images.unsplash.com/photo-1643631616821-2c9efb9dbb2b?auto=format&fit=crop&w=2000&q=80"
      }), []);

      const flyers = useMemo(() => [
        {
          id: "mango",
          name: "Mango",
          img: "https://images.unsplash.com/photo-1744374936847-16d0066d2314?auto=format&fit=crop&w=700&q=80"
        },
        {
          id: "tropical",
          name: "Tropical Fruit",
          img: "https://images.unsplash.com/photo-1431794062232-2a99a5431c6c?auto=format&fit=crop&w=700&q=80"
        },
        {
          id: "island",
          name: "Island Harvest",
          img: "https://images.unsplash.com/photo-1560806887-1e4cd0b6cbd6?auto=format&fit=crop&w=700&q=80"
        }
      ], []);

      function spawnFruit(from) {
        const stage = stageRef.current;
        if (!stage) return;

        const startEl = from === "island" ? islandAnchorRef.current : farmAnchorRef.current;
        const targets = [box1Ref.current, box2Ref.current, box3Ref.current].filter(Boolean);
        if (!startEl || targets.length === 0) return;

        const pick = flyers[Math.floor(Math.random() * flyers.length)];
        const target = targets[Math.floor(Math.random() * targets.length)];

        const el = document.createElement("img");
        el.src = pick.img;
        el.alt = pick.name;
        el.className = "pointer-events-none absolute z-[60] rounded-2xl shadow-[0_18px_60px_rgba(0,0,0,0.22)] border border-white/40";
        const size = 52 + Math.floor(Math.random() * 28);
        el.style.width = `${size}px`;
        el.style.height = `${size}px`;
        el.style.objectFit = "cover";
        el.style.opacity = "0";
        stage.appendChild(el);

        const stageRect = stage.getBoundingClientRect();
        const sRect = startEl.getBoundingClientRect();
        const tRect = target.getBoundingClientRect();

        const startX = sRect.left + sRect.width / 2 - stageRect.left;
        const startY = sRect.top + sRect.height / 2 - stageRect.top;
        const endX = tRect.left + tRect.width / 2 - stageRect.left;
        const endY = tRect.top + tRect.height / 2 - stageRect.top;

        gsap.set(el, {
          x: startX,
          y: startY,
          scale: 0.95,
          rotate: Math.random() * 18 - 9,
          opacity: 0
        });

        const midX = (startX + endX) / 2 + (from === "island" ? 160 : -160);
        const midY = Math.min(startY, endY) - (120 + Math.random() * 160);

        gsap.to(el, { opacity: 1, duration: 0.15, ease: "power1.out" });

        gsap.to(el, {
          duration: 2.0 + Math.random() * 0.9,
          ease: "power2.inOut",
          motionPath: {
            path: [
              { x: startX, y: startY },
              { x: midX, y: midY },
              { x: endX, y: endY }
            ],
            curviness: 1.2
          },
          rotate: `+=${Math.random() * 40 - 20}`,
          scale: 0.78,
          onComplete: () => {
            gsap.fromTo(target, { scale: 1 }, { scale: 1.06, duration: 0.12, yoyo: true, repeat: 1, ease: "power2.out" });
            gsap.to(el, { opacity: 0, duration: 0.22, ease: "power1.out", onComplete: () => el.remove() });
          }
        });
      }

      useEffect(() => {
        const raf = requestAnimationFrame(() => setReady(true));
        return () => cancelAnimationFrame(raf);
      }, []);

      useEffect(() => {
        if (!ready) return;

        const scope = scopeRef.current;
        const stage = stageRef.current;
        const camera = cameraRef.current;
        const hero = heroRef.current;

        if (!scope || !stage || !camera || !hero) return;

        const ctx = gsap.context(() => {
          ScrollTrigger.create({
            trigger: hero,
            start: "top top",
            end: "+=2400",
            pin: true,
            scrub: true
          });

          gsap.fromTo(camera, { xPercent: 0 }, {
            xPercent: -58,
            ease: "none",
            scrollTrigger: {
              trigger: hero,
              start: "top top",
              end: "+=2400",
              scrub: true
            }
          });

          gsap.to(".ocean-drift", {
            backgroundPosition: "120% 50%",
            duration: 12,
            repeat: -1,
            yoyo: true,
            ease: "sine.inOut"
          });

          gsap.to(".forest-drift", {
            backgroundPosition: "50% 58%",
            duration: 10,
            repeat: -1,
            yoyo: true,
            ease: "sine.inOut"
          });

          gsap.utils.toArray(".reveal").forEach((el) => {
            gsap.fromTo(el, { y: 18, opacity: 0 }, {
              y: 0,
              opacity: 1,
              duration: 0.8,
              ease: "power3.out",
              scrollTrigger: { trigger: el, start: "top 85%" }
            });
          });
        }, scope);

        const islandInterval = setInterval(() => spawnFruit("island"), 900);
        const farmInterval = setInterval(() => spawnFruit("farm"), 1200);

        return () => {
          clearInterval(islandInterval);
          clearInterval(farmInterval);
          ctx.revert();
        };
      }, [ready]);

      function estimateUpsDemo({ zip, lbs, service }) {
        const z = String(zip || "").replace(/\D/g, "").slice(0, 5);
        if (z.length !== 5) {
          return { ok: false, message: "Enter a valid 5-digit ZIP." };
        }

        const zoneDigit = parseInt(z[0], 10);
        const zoneFactor = zoneDigit <= 2 ? 1.0 : zoneDigit <= 4 ? 1.15 : zoneDigit <= 6 ? 1.3 : zoneDigit <= 8 ? 1.45 : 1.6;

        const weight = Math.max(1, Number(lbs) || 1);
        const weightFactor = 1 + Math.min(0.9, weight / 40);

        const base = service === "2DAY" ? 18 : service === "NEXTDAY" ? 38 : 12;
        const rate = Math.round((base * zoneFactor * weightFactor + 2.75) * 100) / 100;

        const days = service === "NEXTDAY" ? "1 business day" : service === "2DAY" ? "2 business days" : "3–5 business days";

        return {
          ok: true,
          carrier: "UPS (Estimate)",
          service,
          days,
          rate,
          zip: z,
          weight
        };
      }

      function calcShipping() {
        const totalWeight = Math.max(1, Number(boxCount) || 1) * Math.max(1, Number(weightPerBoxLbs) || 1);
        const res = estimateUpsDemo({ zip: shipToZip, lbs: totalWeight, service });
        setShipEst(res);
      }

      function formatMoney(n) {
        return `$${Number(n || 0).toFixed(2)}`;
      }

      async function handlePay(e) {
        e.preventDefault();
        setPaid(false);

        const n = cardNumber.replace(/\s/g, "");
        if (!shipEst?.ok) {
          setShipEst({ ok: false, message: "Please calculate shipping before paying." });
          return;
        }
        if (!cardName || n.length < 12 || !exp || !cvc) {
          alert("Please fill in name, card number, exp, and CVC (demo).");
          return;
        }

        setProcessing(true);
        await new Promise((r) => setTimeout(r, 1200));
        setProcessing(false);
        setPaid(true);
        setOrderId("DFT-" + Math.floor(Math.random() * 900000 + 100000));
      }

      const subtotal = 89 * Math.max(1, Number(boxCount) || 1);
      const shipCost = shipEst?.ok ? shipEst.rate : 0;
      const tax = Math.round((subtotal * 0.08) * 100) / 100;
      const total = Math.round((subtotal + shipCost + tax) * 100) / 100;

      return (
        <div ref={scopeRef} className="relative min-h-screen bg-[#FDF4E3] text-[#1C1917] overflow-hidden">
          {/* NAV */}
          <div className="fixed inset-x-0 top-0 z-[80] border-b border-black/5 bg-white/45 backdrop-blur-xl">
            <div className="mx-auto flex max-w-6xl items-center justify-between px-4 py-3">
              <div className="flex items-center gap-2">
                <span className="h-9 w-9 rounded-2xl bg-gradient-to-br from-emerald-500 via-sky-400 to-amber-400 shadow-[0_18px_60px_rgba(0,0,0,0.12)]" />
                <span className="text-lg font-semibold tracking-tight text-[#2A1A12]">Dream Farm Trust</span>
              </div>
              <div className="hidden md:flex gap-5 text-sm text-black/60">
                <a className="hover:text-black transition-colors" href="#below">Scroll story</a>
                <a className="hover:text-black transition-colors" href="#checkout">Checkout</a>
              </div>
            </div>
          </div>

          {/* HERO (PINNED) */}
          <section id="hero" ref={heroRef} className="relative pt-16">
            <div ref={stageRef} className="relative h-[calc(100vh-64px)] overflow-hidden">
              <div ref={cameraRef} className="absolute inset-0 w-[170vw]">
                {/* LEFT: ISLAND */}
                <div className="absolute left-0 top-0 h-full w-[56vw]">
                  <div className="absolute inset-0 bg-cover bg-center" style={{ backgroundImage: `url(${BG.island})` }} />
                  <div className="forest-drift absolute inset-0 bg-cover opacity-45 mix-blend-multiply" style={{ backgroundImage: `url(${BG.forest})`, backgroundPosition: "50% 50%" }} />
                  <div className="absolute inset-0 bg-[radial-gradient(circle_at_top_left,rgba(255,255,255,0.75),transparent_60%)]" />

                  <div ref={islandAnchorRef} className="absolute left-[8%] top-[14%] h-16 w-16 rounded-3xl border border-white/60 bg-white/35 backdrop-blur shadow-[0_18px_60px_rgba(0,0,0,0.12)]">
                    <div className="flex h-full w-full items-center justify-center text-[10px] font-semibold text-black/70">ISLAND</div>
                  </div>

                  <div className="absolute left-[6%] top-[28%] max-w-md reveal">
                    <div className="inline-flex items-center gap-2 rounded-full bg-white/55 px-3 py-1 text-[11px] font-semibold text-black/70 border border-white/60">
                      🌴 Tropical islands → fruit flight begins
                    </div>
                    <h1 className="mt-3 text-4xl font-semibold leading-tight text-[#2A1A12]">Fruit flies out of the forest…</h1>
                    <p className="mt-2 text-sm text-black/65">Follow it across the ocean into your box.</p>
                  </div>
                </div>

                {/* MIDDLE: OCEAN */}
                <div className="absolute left-[56vw] top-0 h-full w-[58vw]">
                  <div className="ocean-drift absolute inset-0 bg-cover bg-center" style={{ backgroundImage: `url(${BG.ocean})`, backgroundPosition: "40% 50%" }} />
                  <div className="absolute inset-0 bg-gradient-to-r from-black/10 via-transparent to-black/10" />

                  <div className="absolute left-[10%] top-[45%] max-w-md reveal">
                    <div className="inline-flex items-center gap-2 rounded-full bg-white/55 px-3 py-1 text-[11px] font-semibold text-black/70 border border-white/60">
                      🌊 Rolling waves
                    </div>
                    <h2 className="mt-3 text-3xl font-semibold text-[#2A1A12]">…across the sea…</h2>
                    <p className="mt-2 text-sm text-black/65">Keep scrolling — the camera follows.</p>
                  </div>

                  <div className="absolute right-[10%] bottom-[24%] h-28 w-40 rounded-3xl overflow-hidden border border-white/60 shadow-[0_18px_60px_rgba(0,0,0,0.18)]" style={{ backgroundImage: `url(${BG.tiki})`, backgroundSize: "cover", backgroundPosition: "50% 50%" }} />
                </div>

                {/* RIGHT: FARM */}
                <div className="absolute left-[114vw] top-0 h-full w-[56vw]">
                  <div className="absolute inset-0 bg-cover bg-center" style={{ backgroundImage: `url(${BG.farm})` }} />
                  <div className="absolute inset-0 bg-[radial-gradient(circle_at_top_right,rgba(255,255,255,0.75),transparent_60%)]" />

                  <div ref={farmAnchorRef} className="absolute right-[10%] top-[18%] h-16 w-16 rounded-3xl border border-white/60 bg-white/35 backdrop-blur shadow-[0_18px_60px_rgba(0,0,0,0.12)]">
                    <div className="flex h-full w-full items-center justify-center text-[10px] font-semibold text-black/70">FARM</div>
                  </div>

                  <div className="absolute left-[12%] top-[38%] max-w-md reveal">
                    <div className="inline-flex items-center gap-2 rounded-full bg-white/55 px-3 py-1 text-[11px] font-semibold text-black/70 border border-white/60">
                      🌿 Fruit from orchards
                    </div>
                    <h2 className="mt-3 text-3xl font-semibold text-[#2A1A12]">…into the farm… into your box.</h2>
                    <p className="mt-2 text-sm text-black/65">Island canopy + farm trees → same destination.</p>
                  </div>
                </div>
              </div>

              {/* FIXED OVERLAY: TABLE + BOXES */}
              <div className="pointer-events-none absolute inset-0 z-[70]">
                <div className="absolute bottom-0 left-0 w-full h-[38vh]">
                  <div className="absolute inset-0 bg-cover bg-bottom opacity-95" style={{ backgroundImage: `url(${BG.table})` }} />
                  <div className="absolute inset-0 bg-gradient-to-t from-black/25 via-black/0 to-transparent" />
                </div>

                <div className="absolute left-1/2 bottom-[10vh] -translate-x-1/2 z-[75] flex gap-4">
                  <div ref={box1Ref} className="h-16 w-20 rounded-2xl bg-white/70 border border-white/60 shadow-[0_18px_60px_rgba(0,0,0,0.18)] backdrop-blur">
                    <div className="h-full w-full flex items-center justify-center text-[11px] font-bold text-black/60">BOX</div>
                  </div>
                  <div ref={box2Ref} className="h-16 w-20 rounded-2xl bg-white/70 border border-white/60 shadow-[0_18px_60px_rgba(0,0,0,0.18)] backdrop-blur">
                    <div className="h-full w-full flex items-center justify-center text-[11px] font-bold text-black/60">BOX</div>
                  </div>
                  <div ref={box3Ref} className="h-16 w-20 rounded-2xl bg-white/70 border border-white/60 shadow-[0_18px_60px_rgba(0,0,0,0.18)] backdrop-blur">
                    <div className="h-full w-full flex items-center justify-center text-[11px] font-bold text-black/60">BOX</div>
                  </div>
                </div>
              </div>

              <div className="absolute bottom-6 left-1/2 -translate-x-1/2 z-[90]">
                <div className="rounded-full bg-white/60 border border-white/60 px-4 py-2 text-xs font-semibold text-black/70 shadow-[0_18px_60px_rgba(0,0,0,0.14)] backdrop-blur">
                  ↓ keep scrolling — follow the fruit flight
                </div>
              </div>
            </div>
          </section>

          {/* BELOW THE FOLD */}
          <section id="below" className="mx-auto max-w-6xl px-4 py-12">
            <div className="reveal rounded-3xl bg-white/70 border border-white/60 shadow-[0_18px_60px_rgba(0,0,0,0.10)] backdrop-blur p-6">
              <h3 className="text-xl font-semibold text-[#2A1A12]">Scroll story reward</h3>
              <p className="mt-2 text-sm text-black/65">Next is checkout with shipping estimation + payment (demo).</p>
            </div>
          </section>

          {/* CHECKOUT */}
          <section id="checkout" className="mx-auto max-w-6xl px-4 pb-24">
            <div className="grid gap-8 md:grid-cols-[1.1fr,0.9fr]">
              <div className="reveal rounded-3xl bg-white/70 border border-white/60 shadow-[0_18px_60px_rgba(0,0,0,0.10)] backdrop-blur p-6">
                <h3 className="text-xl font-semibold text-[#2A1A12]">Checkout</h3>
                <p className="mt-1 text-sm text-black/65">UPS shipping estimate (demo) + simulated payment processing.</p>

                <div className="mt-6 rounded-2xl bg-white/60 border border-white/60 p-4">
                  <div className="text-sm font-semibold text-[#2A1A12]">UPS Shipping Estimator</div>

                  <div className="mt-3 grid gap-3 sm:grid-cols-2">
                    <label className="text-xs text-black/70">
                      Ship-to ZIP
                      <input value={shipToZip} onChange={(e) => setShipToZip(e.target.value)} placeholder="e.g. 80202" className="mt-1 w-full rounded-xl border border-black/10 bg-white px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-sky-300" />
                    </label>

                    <label className="text-xs text-black/70">
                      UPS Service
                      <select value={service} onChange={(e) => setService(e.target.value)} className="mt-1 w-full rounded-xl border border-black/10 bg-white px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-sky-300">
                        <option value="GROUND">UPS Ground</option>
                        <option value="2DAY">UPS 2nd Day Air</option>
                        <option value="NEXTDAY">UPS Next Day Air</option>
                      </select>
                    </label>

                    <label className="text-xs text-black/70">
                      Boxes
                      <input type="number" min={1} value={boxCount} onChange={(e) => setBoxCount(e.target.value)} className="mt-1 w-full rounded-xl border border-black/10 bg-white px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-sky-300" />
                    </label>

                    <label className="text-xs text-black/70">
                      Weight per box (lbs)
                      <input type="number" min={1} value={weightPerBoxLbs} onChange={(e) => setWeightPerBoxLbs(e.target.value)} className="mt-1 w-full rounded-xl border border-black/10 bg-white px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-sky-300" />
                    </label>
                  </div>

                  <div className="mt-3 flex flex-wrap items-center gap-3">
                    <button type="button" onClick={calcShipping} className="rounded-full bg-sky-500 px-4 py-2 text-sm font-semibold text-white shadow hover:bg-sky-600">
                      Calculate shipping
                    </button>

                    {shipEst?.ok && (
                      <div className="text-sm text-black/70">
                        <span className="font-semibold">{shipEst.carrier}</span> · <span className="font-semibold">{shipEst.service}</span> · {shipEst.days} · <span className="font-semibold">{formatMoney(shipEst.rate)}</span>
                      </div>
                    )}

                    {shipEst && !shipEst.ok && (
                      <div className="text-sm text-red-600">{shipEst.message}</div>
                    )}
                  </div>

                  <div className="mt-2 text-[11px] text-black/55">
                    Demo estimate uses ZIP zone approximation + weight. Replace with real UPS API later.
                  </div>
                </div>

                <form onSubmit={handlePay} className="mt-6 rounded-2xl bg-white/60 border border-white/60 p-4">
                  <div className="text-sm font-semibold text-[#2A1A12]">Payment</div>

                  <div className="mt-3 grid gap-3 sm:grid-cols-2">
                    <label className="text-xs text-black/70 sm:col-span-2">
                      Name on card
                      <input value={cardName} onChange={(e) => setCardName(e.target.value)} placeholder="Full name" className="mt-1 w-full rounded-xl border border-black/10 bg-white px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-emerald-300" />
                    </label>

                    <label className="text-xs text-black/70 sm:col-span-2">
                      Card number
                      <input value={cardNumber} onChange={(e) => setCardNumber(e.target.value)} placeholder="1234 5678 9012 3456" className="mt-1 w-full rounded-xl border border-black/10 bg-white px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-emerald-300" />
                    </label>

                    <label className="text-xs text-black/70">
                      Exp (MM/YY)
                      <input value={exp} onChange={(e) => setExp(e.target.value)} placeholder="08/29" className="mt-1 w-full rounded-xl border border-black/10 bg-white px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-emerald-300" />
                    </label>

                    <label className="text-xs text-black/70">
                      CVC
                      <input value={cvc} onChange={(e) => setCvc(e.target.value)} placeholder="123" className="mt-1 w-full rounded-xl border border-black/10 bg-white px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-emerald-300" />
                    </label>
                  </div>

                  <div className="mt-4 flex flex-wrap items-center gap-3">
                    <button type="submit" disabled={processing} className="rounded-full bg-emerald-600 px-4 py-2 text-sm font-semibold text-white shadow hover:bg-emerald-700 disabled:opacity-60">
                      {processing ? "Processing…" : "Pay now"}
                    </button>

                    {paid && (
                      <div className="text-sm text-emerald-700 font-semibold">Paid ✓ Order {orderId}</div>
                    )}
                  </div>

                  <div className="mt-2 text-[11px] text-black/55">
                    Payment is simulated for preview. Replace with Stripe later.
                  </div>
                </form>
              </div>

              <div className="reveal rounded-3xl bg-white/70 border border-white/60 shadow-[0_18px_60px_rgba(0,0,0,0.10)] backdrop-blur p-6">
                <h4 className="text-sm font-semibold text-[#2A1A12]">Order Summary</h4>

                <div className="mt-3 space-y-2 text-sm text-black/70">
                  <div className="flex items-center justify-between">
                    <span>Boxes</span>
                    <span className="font-semibold">{Math.max(1, Number(boxCount) || 1)}</span>
                  </div>
                  <div className="flex items-center justify-between">
                    <span>Subtotal</span>
                    <span className="font-semibold">{formatMoney(subtotal)}</span>
                  </div>
                  <div className="flex items-center justify-between">
                    <span>Shipping</span>
                    <span className="font-semibold">{shipEst?.ok ? formatMoney(shipCost) : "—"}</span>
                  </div>
                  <div className="flex items-center justify-between">
                    <span>Tax (est.)</span>
                    <span className="font-semibold">{formatMoney(tax)}</span>
                  </div>
                  <div className="border-t border-black/10 pt-2 flex items-center justify-between">
                    <span className="font-semibold text-[#2A1A12]">Total</span>
                    <span className="font-semibold text-[#2A1A12]">{formatMoney(total)}</span>
                  </div>
                </div>

                <div className="mt-4 rounded-2xl bg-white/60 border border-white/60 p-4 text-[11px] text-black/60">
                  Tip: Enter a ZIP, choose UPS service, click "Calculate shipping", then Pay.
                </div>
              </div>
            </div>
          </section>
        </div>
      );
    }

    ReactDOM.render(<DreamFarmApp />, document.getElementById('root'));
  </script>
</body>
</html>
